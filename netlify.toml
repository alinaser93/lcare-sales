[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route the app's /api/extract calls to the serverless function
[[redirects]]
  from = "/api/extract"
  to = "/.netlify/functions/extract"
  status = 200

# SPA fallback (single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
